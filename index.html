<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Gọi Món - Fix Layout Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --success-color: #2ecc71;
            --share-color: #3498db;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        .section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            font-size: 1.2rem;
        }

        .search-box {
            width: 100%; padding: 12px; border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 1rem; box-sizing: border-box; margin-bottom: 15px;
        }

        .menu-list {
            max-height: 180px; overflow-y: auto; border: 1px solid var(--border-color);
            border-radius: 8px; margin-bottom: 15px;
        }

        .menu-item { padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; }
        .menu-item.selected { background-color: #e2e8f0; font-weight: bold; }

        .options-group { margin-bottom: 15px; }
        .options-group label.group-title { display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568; }

        .quantity-control { display: flex; align-items: center; gap: 10px; }
        .btn-qty { background: #cbd5e1; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        #quantity-val { font-size: 1.2rem; font-weight: bold; min-width: 30px; text-align: center; }
        
        .radio-option { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; }
        .note-box { width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; }

        .btn-add {
            background-color: var(--success-color); color: white; border: none; padding: 14px;
            border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-add:disabled { background-color: #cbd5e1; cursor: not-allowed; }

        /* Kiểu dáng Table chung */
        .order-table { width: 100%; border-collapse: collapse; margin-top: 5px; table-layout: fixed; }
        .order-table th, .order-table td { padding: 10px 8px; text-align: left; border-bottom: 1px solid var(--border-color); word-break: break-word; }
        .order-table th { background-color: #f1f5f9; color: var(--primary-color); font-weight: 600; }
        .btn-delete { background: none; border: none; color: var(--accent-color); cursor: pointer; font-weight: bold; }

        .cart-placeholder { color: #a0aec0; text-align: center; padding: 30px 0; font-style: italic; }
        
        .total-section {
            margin-top: 15px; padding-top: 15px; border-top: 2px dashed var(--border-color);
            display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; font-weight: bold;
        }
        .total-price { color: var(--accent-color); }
        .item-meta-text { display: block; font-size: 0.8rem; color: #4a5568; margin-top: 4px; }
        
        .badge-option { display: inline-block; padding: 1px 6px; font-size: 0.75rem; font-weight: bold; border-radius: 4px; background-color: #e2e8f0; }
        .badge-foodonly { background-color: #ffeede; color: #d35400; }
        .badge-brownrice { background-color: #eafaf1; color: #27ae60; }

        /* Vùng Capture Ảnh xuất Phiếu */
        .capture-area {
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Định tỷ lệ cột cố định cho mục Chốt Đơn để không bao giờ bị méo khi thu nhỏ */
        #checkout-table th:nth-child(1), #checkout-table td:nth-child(1) { width: 50%; }
        #checkout-table th:nth-child(2), #checkout-table td:nth-child(2) { width: 20%; text-align: center; }
        #checkout-table th:nth-child(3), #checkout-table td:nth-child(3) { width: 30%; text-align: right; }

        .action-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .btn-action {
            padding: 12px; border: none; border-radius: 8px; font-size: 0.95rem;
            font-weight: bold; cursor: pointer; color: white; display: flex;
            align-items: center; justify-content: center; gap: 6px;
        }

        .btn-share { background-color: var(--share-color); }
        .btn-download { background-color: var(--primary-color); }

        /* Cấu hình responsive cho Mobile */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; gap: 15px; }
            .full-width { grid-column: span 1; }
            body { padding: 8px; }
            .order-table th, .order-table td { padding: 8px 4px; font-size: 0.9rem; }
        }

        @media print {
            body * { visibility: hidden; background: transparent !important; box-shadow: none !important; }
            #section-checkout, #section-checkout * { visibility: visible; }
            #section-checkout { position: absolute; left: 0; top: 0; width: 100%; border: none; padding: 0; }
            .action-group { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <h2>1. Chọn Món & Tùy Chọn</h2>
        <input type="text" id="search" class="search-box" placeholder="Nhập tên món ăn cần tìm..." oninput="filterMenu()">
        <div class="menu-list" id="menu-container"></div>

        <div class="options-group">
            <label class="group-title">Số lượng:</label>
            <div class="quantity-control">
                <button class="btn-qty" onclick="updateQuantity(-1)">-</button>
                <span id="quantity-val">1</span>
                <button class="btn-qty" onclick="updateQuantity(1)">+</button>
            </div>
        </div>

        <div class="options-group">
            <label class="group-title">Tùy chọn món ăn:</label>
            <label class="radio-option">
                <input type="radio" name="meal-option" value="normal" checked onchange="toggleCustomNote(true)">
                <span>Bình thường (Cơm trắng)</span>
            </label>
            <label class="radio-option">
                <input type="radio" name="meal-option" value="food_only" onchange="toggleCustomNote(false)">
                <span>Chỉ lấy đồ ăn <span style="color: #e74c3c; font-weight:500;">(-15.000 đ)</span></span>
            </label>
            <label class="radio-option">
                <input type="radio" name="meal-option" value="brown_rice" onchange="toggleCustomNote(false)">
                <span>Lấy gạo lức <span style="color: #2ecc71; font-weight:500;">(+5.000 đ)</span></span>
            </label>
            <div id="custom-note-container">
                <input type="text" id="custom-note" class="note-box" placeholder="Ghi chú thêm (ví dụ: ít cơm, nhiều sốt...)">
            </div>
        </div>
        <button id="add-btn" class="btn-add" onclick="addToCart()" disabled>Thêm vào đơn hàng</button>
    </div>

    <div class="section">
        <h2>2. Sửa Đổi Đơn Hàng</h2>
        <div id="cart-placeholder" class="cart-placeholder">Đơn hàng trống.</div>
        <table id="order-table" class="order-table">
            <thead>
                <tr>
                    <th style="width: 50%;">Món ăn</th>
                    <th style="text-align: center; width: 15%;">SL</th>
                    <th style="text-align: right; width: 23%;">Thành tiền</th>
                    <th style="text-align: center; width: 12%;">Xóa</th>
                </tr>
            </thead>
            <tbody id="cart-items"></tbody>
        </table>
        <div class="total-section">
            <span>Tạm tính:</span>
            <span class="total-price" id="cart-total">0 đ</span>
        </div>
    </div>

    <div class="section full-width" id="section-checkout">
        
        <div id="print-area" class="capture-area">
            <h2 id="checkout-title" style="border-bottom: 2px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px;">Menu Thứ ...</h2>
            
            <div id="checkout-placeholder" class="cart-placeholder">Chưa có dữ liệu để chốt đơn.</div>
            
            <table id="checkout-table" class="order-table">
                <thead>
                    <tr>
                        <th>Món ăn</th>
                        <th>Số lượng</th>
                        <th>Thành tiền</th>
                    </tr>
                </thead>
                <tbody id="checkout-items"></tbody>
            </table>
        </div>

        <div class="action-group" id="action-buttons" style="display: none;">
            <button id="share-img-btn" class="btn-action btn-share" onclick="shareOrderAsImage()">
                📸 Chia sẻ file ẢNH qua ShareSheet
            </button>
            <button class="btn-action btn-download" onclick="downloadReceipt()">
                🖨️ Tải phiếu / In PDF
            </button>
        </div>
    </div>
</div>

<script>
    const menuData = [
        { id: 3, name: "Cá ngừ kho thơm", price: 45000 },
        { id: 6, name: "Cá điêu hồng chiên", price: 45000 },
        { id: 11, name: "Ba rọi chiên", price: 45000 },
        { id: 14, name: "Gà chiên xả", price: 45000 },
        { id: 18, name: "Mắm ruốc xào thịt", price: 45000 },
        { id: 20, name: "Rau muống xào chao", price: 45000 },
        { id: 21, name: "Giò heo nấu nấm đông cô", price: 50000 }
    ];

    let selectedItem = null; let currentQuantity = 1; let cart = [];

    function initTitleDate() {
        const days = ["Chủ Nhật", "Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7"];
        const today = new Date();
        const dayName = days[today.getDay()];
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        document.getElementById('checkout-title').innerText = `Menu ${dayName} (${dd}/${mm})`;
    }

    function renderMenu(items) {
        const container = document.getElementById('menu-container'); container.innerHTML = '';
        if(items.length === 0) { container.innerHTML = '<div style="padding:15px; color:#999; text-align:center;">Không tìm thấy món</div>'; return; }
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = `menu-item ${selectedItem && selectedItem.id === item.id ? 'selected' : ''}`;
            div.innerHTML = `<span>${item.name}</span> <span>${item.price.toLocaleString('vi-VN')} đ</span>`;
            div.onclick = () => selectItem(item);
            container.appendChild(div);
        });
    }

    function filterMenu() {
        const keyword = document.getElementById('search').value.toLowerCase().trim();
        const filtered = menuData.filter(item => item.name.toLowerCase().includes(keyword));
        renderMenu(filtered);
    }

    function selectItem(item) { selectedItem = item; document.getElementById('add-btn').disabled = false; filterMenu(); }
    function updateQuantity(amount) { currentQuantity += amount; if (currentQuantity < 1) currentQuantity = 1; document.getElementById('quantity-val').innerText = currentQuantity; }
    function toggleCustomNote(show) { const customNoteInput = document.getElementById('custom-note'); customNoteInput.disabled = !show; customNoteInput.style.opacity = show ? "1" : "0.5"; if(!show) customNoteInput.value = ""; }

    function addToCart() {
        if (!selectedItem) return;
        const optionRadio = document.querySelector('input[name="meal-option"]:checked').value;
        let finalPrice = selectedItem.price; let optionLabel = "Bình thường"; let badgeClass = "badge-option"; let textNote = "";

        if (optionRadio === "normal") { textNote = document.getElementById('custom-note').value.trim(); } 
        else if (optionRadio === "food_only") { finalPrice = selectedItem.price - 15000; optionLabel = "Chỉ lấy đồ ăn"; badgeClass += " badge-foodonly"; } 
        else if (optionRadio === "brown_rice") { finalPrice = selectedItem.price + 5000; optionLabel = "Gạo lức"; badgeClass += " badge-brownrice"; }

        const cartItemId = `${selectedItem.id}_${optionRadio}_${textNote}`;
        const existingIndex = cart.findIndex(cartItem => cartItem.cartItemId === cartItemId);

        if (existingIndex > -1) { cart[existingIndex].quantity += currentQuantity; } 
        else { cart.push({ cartItemId: cartItemId, id: selectedItem.id, name: selectedItem.name, calculatedPrice: finalPrice, quantity: currentQuantity, optionLabel: optionLabel, badgeClass: badgeClass, textNote: textNote }); }

        selectedItem = null; currentQuantity = 1;
        document.getElementById('quantity-val').innerText = '1'; document.getElementById('custom-note').value = ''; document.getElementById('search').value = '';
        document.querySelectorAll('input[name="meal-option"]')[0].checked = true; toggleCustomNote(true); document.getElementById('add-btn').disabled = true;
        filterMenu(); renderCart();
    }

    function removeFromCart(index) { cart.splice(index, 1); renderCart(); }

    function renderCart() {
        const placeholder2 = document.getElementById('cart-placeholder'); const table2 = document.getElementById('order-table'); const tbody2 = document.getElementById('cart-items'); const totalSpan2 = document.getElementById('cart-total');
        const placeholder3 = document.getElementById('checkout-placeholder'); const table3 = document.getElementById('checkout-table'); const tbody3 = document.getElementById('checkout-items'); const actionButtons = document.getElementById('action-buttons');

        if (cart.length === 0) {
            placeholder2.style.display = 'block'; table2.style.display = 'none'; totalSpan2.innerText = '0 đ';
            placeholder3.style.display = 'block'; table3.style.display = 'none'; actionButtons.style.display = 'none';
            return;
        }

        placeholder2.style.display = 'none'; table2.style.display = 'table';
        placeholder3.style.display = 'none'; table3.style.display = 'table'; actionButtons.style.display = 'grid';

        tbody2.innerHTML = ''; tbody3.innerHTML = '';
        let totalOrderPrice = 0; let totalQuantity = 0;

        cart.forEach((item, index) => {
            const itemTotal = item.calculatedPrice * item.quantity;
            totalOrderPrice += itemTotal; totalQuantity += item.quantity;

            const showBadge = item.optionLabel !== "Bình thường";
            const showNote = item.textNote && item.textNote.length > 0;

            const metaHTML = `
                ${showBadge || showNote ? `
                    <div class="item-meta-text">
                        ${showBadge ? `<span class="${item.badgeClass}">${item.optionLabel}</span>` : ''}
                        ${showNote ? `<span style="font-style: italic; color:#718096; ${showBadge ? 'margin-left: 5px;' : ''}">- GC: ${item.textNote}</span>` : ''}
                    </div>
                ` : ''}
            `;

            // Section 2 Table Rows
            const tr2 = document.createElement('tr');
            tr2.innerHTML = `<td><strong>${item.name}</strong>${metaHTML}</td><td style="text-align: center; font-weight: 600;">${item.quantity}</td><td style="text-align: right; font-weight: 600;">${itemTotal.toLocaleString('vi-VN')} đ</td><td style="text-align: center;"><button class="btn-delete" onclick="removeFromCart(${index})">✕</button></td>`;
            tbody2.appendChild(tr2);

            // Section 3 Table Rows (ĐÃ BỎ chữ " phần")
            const tr3 = document.createElement('tr');
            tr3.innerHTML = `
                <td><strong>${item.name}</strong>${metaHTML}</td>
                <td style="text-align: center; font-weight: 600; color: #2c3e50;">${item.quantity}</td>
                <td style="text-align: right; font-weight: 600; color: #2c3e50;">${itemTotal.toLocaleString('vi-VN')} đ</td>
            `;
            tbody3.appendChild(tr3);
        });

        totalSpan2.innerText = `${totalOrderPrice.toLocaleString('vi-VN')} đ`;

        // Dòng Tổng Cộng cuối bảng Section 3
        const totalRow3 = document.createElement('tr');
        totalRow3.style.backgroundColor = '#f8fafc'; 
        totalRow3.style.borderTop = '2px dashed var(--border-color)';
        totalRow3.innerHTML = `
            <td style="text-align: left; font-weight: bold; padding: 12px 8px; color: var(--primary-color);">Tổng cộng</td>
            <td style="text-align: center; font-weight: bold; font-size: 1.05rem; color: var(--primary-color);">${totalQuantity}</td>
            <td style="text-align: right; font-weight: bold; font-size: 1.05rem; color: var(--accent-color);">${totalOrderPrice.toLocaleString('vi-VN')} đ</td>
        `;
        tbody3.appendChild(totalRow3);
    }

    async function shareOrderAsImage() {
        if (cart.length === 0) return;

        const shareBtn = document.getElementById('share-img-btn');
        const originalText = shareBtn.innerText;
        shareBtn.innerText = "⏳ Đang tạo ảnh...";
        shareBtn.disabled = true;

        try {
            const printArea = document.getElementById('print-area');
            const titleText = document.getElementById('checkout-title').innerText;

            const canvas = await html2canvas(printArea, {
                scale: 2, 
                backgroundColor: '#ffffff',
                useCORS: true
            });

            canvas.toBlob(async (blob) => {
                if (!blob) { alert("Không thể tạo file ảnh."); return; }
                const file = new File([blob], `Menu_${titleText.replace(/[\s()\/]/g, '_')}.png`, { type: 'image/png' });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: titleText,
                        text: `Gửi danh sách đơn hàng ${titleText}`
                    });
                } else {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `Menu_${titleText}.png`;
                    a.click();
                    alert("Hệ thống đã tự động TẢI FILE ẢNH về thiết bị do trình duyệt chưa hỗ trợ Share file ảnh trực tiếp!");
                }
                shareBtn.innerText = originalText; shareBtn.disabled = false;
            }, 'image/png');

        } catch (error) {
            console.error("Lỗi khi tạo và share ảnh:", error);
            alert("Có lỗi xảy ra khi xuất ảnh.");
            shareBtn.innerText = originalText; shareBtn.disabled = false;
        }
    }

    function downloadReceipt() { window.print(); }

    // Khởi động render ban đầu
    initTitleDate(); table2 = document.getElementById('order-table'); table2.style.display = 'none'; document.getElementById('checkout-table').style.display = 'none'; renderMenu(menuData);
</script>
</body>
</html>
