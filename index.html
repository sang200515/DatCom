<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Gọi Món - Tùy Chọn Nâng Cao</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --success-color: #2ecc71;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1150px;
            display: grid;
            grid-template-columns: 1.1fr 1.3fr;
            gap: 20px;
        }

        @media (max-width: 850px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            font-size: 1.3rem;
        }

        /* Section 1: Controls */
        .search-box {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .menu-list {
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .menu-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background-color: #f1f5f9;
        }

        .menu-item.selected {
            background-color: #e2e8f0;
            font-weight: bold;
        }

        .options-group {
            margin-bottom: 15px;
        }

        .options-group label.group-title {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-qty {
            background: #cbd5e1;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }

        #quantity-val {
            font-size: 1.2rem;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        /* Radio options styling */
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .radio-option input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .note-box {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            resize: none;
            box-sizing: border-box;
            margin-top: 5px;
        }

        .btn-add {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-add:hover {
            background-color: #27ae60;
        }

        .btn-add:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        /* Section 2: Order Table */
        .order-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .order-table th, .order-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .order-table th {
            background-color: #f1f5f9;
            color: var(--primary-color);
            font-weight: 600;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-weight: bold;
        }

        .cart-placeholder {
            color: #a0aec0;
            text-align: center;
            padding: 40px 0;
            font-style: italic;
        }

        .total-section {
            margin-top: auto;
            padding-top: 15px;
            border-top: 2px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .total-price {
            color: var(--accent-color);
        }

        .item-meta-text {
            display: block;
            font-size: 0.8rem;
            color: #4a5568;
            margin-top: 2px;
        }
        .badge-option {
            display: inline-block;
            padding: 1px 6px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            background-color: #e2e8f0;
            color: #4a5568;
        }
        .badge-foodonly { background-color: #ffeede; color: #d35400; }
        .badge-brownrice { background-color: #eafaf1; color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <h2>1. Chọn Món & Tùy Chọn</h2>
        
        <input type="text" id="search" class="search-box" placeholder="Nhập tên món ăn cần tìm..." oninput="filterMenu()">
        <div class="menu-list" id="menu-container"></div>

        <div class="options-group">
            <label class="group-title">Số lượng:</label>
            <div class="quantity-control">
                <button class="btn-qty" onclick="updateQuantity(-1)">-</button>
                <span id="quantity-val">1</span>
                <button class="btn-qty" onclick="updateQuantity(1)">+</button>
            </div>
        </div>

        <div class="options-group">
            <label class="group-title">Tùy chọn món ăn:</label>
            
            <label class="radio-option">
                <input type="radio" name="meal-option" value="normal" checked onchange="toggleCustomNote(true)">
                <span>Bình thường (Cơm trắng)</span>
            </label>
            
            <label class="radio-option">
                <input type="radio" name="meal-option" value="food_only" onchange="toggleCustomNote(false)">
                <span>Chỉ lấy đồ ăn <span style="color: #e74c3c; font-weight:500;">(-15.000 đ)</span></span>
            </label>
            
            <label class="radio-option">
                <input type="radio" name="meal-option" value="brown_rice" onchange="toggleCustomNote(false)">
                <span>Lấy gạo lức <span style="color: #2ecc71; font-weight:500;">(+5.000 đ)</span></span>
            </label>

            <div id="custom-note-container">
                <input type="text" id="custom-note" class="note-box" placeholder="Nhập ghi chú thêm nếu có (ví dụ: ít cơm, nhiều sốt...)">
            </div>
        </div>

        <button id="add-btn" class="btn-add" onclick="addToCart()" disabled>Thêm vào đơn hàng</button>
    </div>

    <div class="section">
        <h2>2. Thông Tin Đơn Hàng</h2>
        
        <div id="cart-placeholder" class="cart-placeholder">
            Đơn hàng trống. Vui lòng thêm món ở Section 1.
        </div>

        <table id="order-table" class="order-table" style="display: none;">
            <thead>
                <tr>
                    <th>Món ăn</th>
                    <th style="text-align: center;">SL</th>
                    <th style="text-align: right;">Thành tiền</th>
                    <th style="text-align: center;">Xóa</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                </tbody>
        </table>

        <div class="total-section">
            <span>Tổng đơn hàng:</span>
            <span class="total-price" id="cart-total">0 đ</span>
        </div>
    </div>
</div>

<script>
    // Dữ liệu món ăn gốc (JSON)
    const menuData = [
        { id: 1, name: "Cá điêu hồng chiên", price: 45000 },
        { id: 2, name: "Cá đối chiên", price: 45000 }
    ];

    // State ứng dụng
    let selectedItem = null;
    let currentQuantity = 1;
    let cart = [];

    function renderMenu(items) {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';
        
        if(items.length === 0) {
            container.innerHTML = '<div style="padding:15px; color:#999; text-align:center;">Không tìm thấy món</div>';
            return;
        }

        items.forEach(item => {
            const div = document.createElement('div');
            div.className = `menu-item ${selectedItem && selectedItem.id === item.id ? 'selected' : ''}`;
            div.innerHTML = `<span>${item.name}</span> <span>${item.price.toLocaleString('vi-VN')} đ</span>`;
            div.onclick = () => selectItem(item);
            container.appendChild(div);
        });
    }

    function filterMenu() {
        const keyword = document.getElementById('search').value.toLowerCase().trim();
        const filtered = menuData.filter(item => item.name.toLowerCase().includes(keyword));
        renderMenu(filtered);
    }

    function selectItem(item) {
        selectedItem = item;
        document.getElementById('add-btn').disabled = false;
        filterMenu();
    }

    function updateQuantity(amount) {
        currentQuantity += amount;
        if (currentQuantity < 1) currentQuantity = 1;
        document.getElementById('quantity-val').innerText = currentQuantity;
    }

    // Ẩn/Hiện/Reset ô ghi chú tùy theo radio button được chọn
    function toggleCustomNote(show) {
        const customNoteInput = document.getElementById('custom-note');
        if(show) {
            customNoteInput.disabled = false;
            customNoteInput.style.opacity = "1";
        } else {
            customNoteInput.value = "";
            customNoteInput.disabled = true;
            customNoteInput.style.opacity = "0.5";
        }
    }

    // Xử lý thêm món kèm biến động giá dựa trên option
    function addToCart() {
        if (!selectedItem) return;

        // Lấy option đang check
        const optionRadio = document.querySelector('input[name="meal-option"]:checked').value;
        let finalPrice = selectedItem.price;
        let optionLabel = "Bình thường";
        let badgeClass = "badge-option";
        let textNote = "";

        if (optionRadio === "food_only") {
            finalPrice = selectedItem.price - 15000;
            optionLabel = "Chỉ lấy đồ ăn";
            badgeClass += " badge-foodonly";
        } else if (optionRadio === "brown_rice") {
            finalPrice = selectedItem.price + 5000;
            optionLabel = "Gạo lức";
            badgeClass += " badge-brownrice";
        } else {
            textNote = document.getElementById('custom-note').value.trim();
        }

        // Tạo chuỗi định danh duy nhất (Món ID + Loại Option + Text ghi chú) để gộp dòng chính xác
        const cartItemId = `${selectedItem.id}_${optionRadio}_${textNote}`;

        const existingIndex = cart.findIndex(cartItem => cartItem.cartItemId === cartItemId);

        if (existingIndex > -1) {
            cart[existingIndex].quantity += currentQuantity;
        } else {
            cart.push({
                cartItemId: cartItemId,
                id: selectedItem.id,
                name: selectedItem.name,
                calculatedPrice: finalPrice,
                quantity: currentQuantity,
                optionLabel: optionLabel,
                badgeClass: badgeClass,
                textNote: textNote
            });
        }

        // Reset Section 1 về ban đầu
        selectedItem = null;
        currentQuantity = 1;
        document.getElementById('quantity-val').innerText = '1';
        document.getElementById('custom-note').value = '';
        document.getElementById('search').value = '';
        document.querySelectorAll('input[name="meal-option"]')[0].checked = true; // reset về Bình thường
        toggleCustomNote(true);
        document.getElementById('add-btn').disabled = true;
        
        filterMenu();
        renderCart();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function renderCart() {
        const placeholder = document.getElementById('cart-placeholder');
        const table = document.getElementById('order-table');
        const tbody = document.getElementById('cart-items');
        const totalSpan = document.getElementById('cart-total');

        if (cart.length === 0) {
            placeholder.style.display = 'block';
            table.style.display = 'none';
            totalSpan.innerText = '0 đ';
            return;
        }

        placeholder.style.display = 'none';
        table.style.display = 'table';
        tbody.innerHTML = '';

        let totalOrderPrice = 0;

        cart.forEach((item, index) => {
            const itemTotal = item.calculatedPrice * item.quantity;
            totalOrderPrice += itemTotal;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <strong>${item.name}</strong>
                    <div class="item-meta-text">
                        <span class="${item.badgeClass}">${item.optionLabel}</span>
                        ${item.textNote ? `<span style="font-style: italic; color:#718096; margin-left: 5px;">- Gi chú: ${item.textNote}</span>` : ''}
                    </div>
                    <span style="font-size: 0.8rem; color: #a0aec0;">Đơn giá tính lại: ${item.calculatedPrice.toLocaleString('vi-VN')} đ</span>
                </td>
                <td style="text-align: center; font-weight: 600;">${item.quantity}</td>
                <td style="text-align: right; font-weight: 600; color: var(--primary-color);">${itemTotal.toLocaleString('vi-VN')} đ</td>
                <td style="text-align: center;">
                    <button class="btn-delete" onclick="removeFromCart(${index})">✕</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        totalSpan.innerText = `${totalOrderPrice.toLocaleString('vi-VN')} đ`;
    }

    // Khởi tạo ban đầu
    renderMenu(menuData);
</script>

</body>
</html>
