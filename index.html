<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Gọi Món</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Common Section Styling */
        .section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            font-size: 1.3rem;
        }

        /* Section 1: Selection Controls */
        .search-box {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .menu-list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .menu-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background-color: #f1f5f9;
        }

        .menu-item.selected {
            background-color: #e2e8f0;
            font-weight: bold;
        }

        .options-group {
            margin-bottom: 20px;
        }

        .options-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-qty {
            background: #cbd5e1;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .btn-qty:hover {
            background: #cbd5e1e0;
        }

        #quantity-val {
            font-size: 1.2rem;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .note-box {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
        }

        /* Section 2: Results Result */
        .result-placeholder {
            color: #a0aec0;
            text-align: center;
            padding: 40px 0;
            font-style: italic;
        }

        .result-details {
            display: none;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 1.05rem;
        }

        .result-label {
            color: #718096;
        }

        .result-value {
            font-weight: 600;
        }

        .total-price {
            border-top: 2px dashed var(--border-color);
            margin-top: 15px;
            padding-top: 15px;
            font-size: 1.3rem;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <h2>1. Chọn Món & Tùy Chọn</h2>
        
        <input type="text" id="search" class="search-box" placeholder="Nhập tên món ăn cần tìm..." oninput="filterMenu()">
        
        <div class="menu-list" id="menu-container"></div>

        <div class="options-group">
            <label>Số lượng:</label>
            <div class="quantity-control">
                <button class="btn-qty" onclick="updateQuantity(-1)">-</button>
                <span id="quantity-val">1</span>
                <button class="btn-qty" onclick="updateQuantity(1)">+</button>
            </div>
        </div>

        <div class="options-group">
            <label for="note">Ghi chú (Tùy chọn):</label>
            <textarea id="note" class="note-box" rows="2" placeholder="Ví dụ: Ít cơm, nhiều nước sốt..." oninput="updateResult()"></textarea>
        </div>
    </div>

    <div class="section">
        <h2>2. Thông Tin Đơn Hàng</h2>
        
        <div id="placeholder" class="result-placeholder">
            Vui lòng chọn một món ăn ở Section 1 để xem thông tin.
        </div>

        <div id="result-content" class="result-details">
            <div class="result-row">
                <span class="result-label">Tên món:</span>
                <span class="result-value" id="res-name">-</span>
            </div>
            <div class="result-row">
                <span class="result-label">Đơn giá:</span>
                <span class="result-value" id="res-price">0 đ</span>
            </div>
            <div class="result-row">
                <span class="result-label">Số lượng:</span>
                <span class="result-value" id="res-qty">1</span>
            </div>
            <div class="result-row">
                <span class="result-label">Ghi chú:</span>
                <span class="result-value" id="res-note" style="font-weight: normal; font-style: italic;">Không có</span>
            </div>
            <div class="result-row total-price">
                <span>Tổng tiền:</span>
                <span class="result-value" id="res-total">0 đ</span>
            </div>
        </div>
    </div>
</div>

<script>
    // DANH SÁCH MÓN ĂN (JSON ARRAY)
    // Bạn có thể copy/paste thêm các item mới trực tiếp vào array này
    const menuData = [
        { id: 1, name: "Cá điêu hồng chiên", price: 45000 },
        { id: 2, name: "Cá đối chiên", price: 45000 }
    ];

    let selectedItem = null;
    let currentQuantity = 1;

    // Render danh sách món ăn ban đầu
    function renderMenu(items) {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';
        
        if(items.length === 0) {
            container.innerHTML = '<div style="padding:15px; color:#999; text-align:center;">Không tìm thấy món ăn</div>';
            return;
        }

        items.forEach(item => {
            const div = document.createElement('div');
            div.className = `menu-item ${selectedItem && selectedItem.id === item.id ? 'selected' : ''}`;
            div.innerHTML = `<span>${item.name}</span> <span>${item.price.toLocaleString('vi-VN')} đ</span>`;
            div.onclick = () => selectItem(item);
            container.appendChild(div);
        });
    }

    // Bộ lọc tìm kiếm món ăn
    function filterMenu() {
        const keyword = document.getElementById('search').value.toLowerCase().trim();
        // Convert tiếng Việt có dấu thành không dấu đơn giản (Optional nâng cấp sau nếu cần)
        const filtered = menuData.filter(item => item.name.toLowerCase().includes(keyword));
        renderMenu(filtered);
    }

    // Chọn món ăn từ list
    function selectItem(item) {
        selectedItem = item;
        // Re-render để highlight item được chọn
        filterMenu();
        updateResult();
    }

    // Tăng giảm số lượng
    function updateQuantity(amount) {
        currentQuantity += amount;
        if (currentQuantity < 1) currentQuantity = 1;
        document.getElementById('quantity-val').innerText = currentQuantity;
        updateResult();
    }

    // Cập nhật kết quả hiển thị ở Section 2
    function updateResult() {
        const placeholder = document.getElementById('placeholder');
        const content = document.getElementById('result-content');

        if (!selectedItem) {
            placeholder.style.display = 'block';
            content.style.display = 'none';
            return;
        }

        placeholder.style.display = 'none';
        content.style.display = 'block';

        const note = document.getElementById('note').value.trim();
        const total = selectedItem.price * currentQuantity;

        document.getElementById('res-name').innerText = selectedItem.name;
        document.getElementById('res-price').innerText = `${selectedItem.price.toLocaleString('vi-VN')} đ`;
        document.getElementById('res-qty').innerText = currentQuantity;
        document.getElementById('res-note').innerText = note ? note : "Không có";
        document.getElementById('res-total').innerText = `${total.toLocaleString('vi-VN')} đ`;
    }

    // Khởi chạy lần đầu
    renderMenu(menuData);
</script>

</body>
</html>
