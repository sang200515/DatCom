<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Gọi Món - Nhiều Món</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --success-color: #2ecc71;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1.11fr 1.29fr;
            gap: 20px;
        }

        @media (max-width: 850px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            font-size: 1.3rem;
        }

        /* Section 1: Controls */
        .search-box {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .menu-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .menu-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background-color: #f1f5f9;
        }

        .menu-item.selected {
            background-color: #e2e8f0;
            font-weight: bold;
        }

        .options-group {
            margin-bottom: 15px;
        }

        .options-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-qty {
            background: #cbd5e1;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }

        #quantity-val {
            font-size: 1.2rem;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .note-box {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
        }

        .btn-add {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: auto;
        }

        .btn-add:hover {
            background-color: #27ae60;
        }

        .btn-add:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        /* Section 2: Order Table */
        .order-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .order-table th, .order-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .order-table th {
            background-color: #f1f5f9;
            color: var(--primary-color);
            font-weight: 600;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-weight: bold;
        }

        .cart-placeholder {
            color: #a0aec0;
            text-align: center;
            padding: 40px 0;
            font-style: italic;
        }

        .total-section {
            margin-top: auto;
            padding-top: 15px;
            border-top: 2px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .total-price {
            color: var(--accent-color);
        }

        .item-note-text {
            display: block;
            font-size: 0.8rem;
            color: #718096;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <h2>1. Chọn Món & Tùy Chọn</h2>
        
        <input type="text" id="search" class="search-box" placeholder="Nhập tên món ăn cần tìm..." oninput="filterMenu()">
        <div class="menu-list" id="menu-container"></div>

        <div class="options-group">
            <label>Số lượng:</label>
            <div class="quantity-control">
                <button class="btn-qty" onclick="updateQuantity(-1)">-</button>
                <span id="quantity-val">1</span>
                <button class="btn-qty" onclick="updateQuantity(1)">+</button>
            </div>
        </div>

        <div class="options-group">
            <label for="note">Ghi chú:</label>
            <textarea id="note" class="note-box" rows="2" placeholder="Ví dụ: Ít cơm, nhiều sốt..."></textarea>
        </div>

        <button id="add-btn" class="btn-add" onclick="addToCart()" disabled>Thêm vào đơn hàng</button>
    </div>

    <div class="section">
        <h2>2. Thông Tin Đơn Hàng</h2>
        
        <div id="cart-placeholder" class="cart-placeholder">
            Đơn hàng trống. Vui lòng thêm món ở Section 1.
        </div>

        <table id="order-table" class="order-table" style="display: none;">
            <thead>
                <tr>
                    <th>Món ăn</th>
                    <th style="text-align: center;">SL</th>
                    <th style="text-align: right;">Thành tiền</th>
                    <th style="text-align: center;">Xóa</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                </tbody>
        </table>

        <div class="total-section">
            <span>Tổng đơn hàng:</span>
            <span class="total-price" id="cart-total">0 đ</span>
        </div>
    </div>
</div>

<script>
    // Dữ liệu gốc
    const menuData = [
        { id: 1, name: "Cá điêu hồng chiên", price: 45000 },
        { id: 2, name: "Cá đối chiên", price: 45000 }
    ];

    // State của ứng dụng
    let selectedItem = null;
    let currentQuantity = 1;
    let cart = [];

    function renderMenu(items) {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';
        
        if(items.length === 0) {
            container.innerHTML = '<div style="padding:15px; color:#999; text-align:center;">Không tìm thấy món</div>';
            return;
        }

        items.forEach(item => {
            const div = document.createElement('div');
            div.className = `menu-item ${selectedItem && selectedItem.id === item.id ? 'selected' : ''}`;
            div.innerHTML = `<span>${item.name}</span> <span>${item.price.toLocaleString('vi-VN')} đ</span>`;
            div.onclick = () => selectItem(item);
            container.appendChild(div);
        });
    }

    function filterMenu() {
        const keyword = document.getElementById('search').value.toLowerCase().trim();
        const filtered = menuData.filter(item => item.name.toLowerCase().includes(keyword));
        renderMenu(filtered);
    }

    function selectItem(item) {
        selectedItem = item;
        document.getElementById('add-btn').disabled = false;
        filterMenu();
    }

    function updateQuantity(amount) {
        currentQuantity += amount;
        if (currentQuantity < 1) currentQuantity = 1;
        document.getElementById('quantity-val').innerText = currentQuantity;
    }

    // Logic thêm món vào giỏ hàng (Section 2)
    function addToCart() {
        if (!selectedItem) return;

        const note = document.getElementById('note').value.trim();
        
        // Kiểm tra xem món trùng tên + trùng ghi chú đã có trong giỏ chưa
        const existingIndex = cart.findIndex(cartItem => 
            cartItem.id === selectedItem.id && cartItem.note === note
        );

        if (existingIndex > -1) {
            // Nếu trùng hoàn toàn thì cộng dồn số lượng
            cart[existingIndex].quantity += currentQuantity;
        } else {
            // Nếu mới hoặc khác ghi chú thì tạo dòng mới
            cart.push({
                id: selectedItem.id,
                name: selectedItem.name,
                price: selectedItem.price,
                quantity: currentQuantity,
                note: note
            });
        }

        // Reset form ở Section 1 về trạng thái ban đầu
        selectedItem = null;
        currentQuantity = 1;
        document.getElementById('quantity-val').innerText = '1';
        document.getElementById('note').value = '';
        document.getElementById('add-btn').disabled = true;
        
        filterMenu();
        renderCart();
    }

    // Xóa món khỏi giỏ hàng
    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

    // Render toàn bộ Section 2 dựa trên mảng cart
    function renderCart() {
        const placeholder = document.getElementById('cart-placeholder');
        const table = document.getElementById('order-table');
        const tbody = document.getElementById('cart-items');
        const totalSpan = document.getElementById('cart-total');

        if (cart.length === 0) {
            placeholder.style.display = 'block';
            table.style.display = 'none';
            totalSpan.innerText = '0 đ';
            return;
        }

        placeholder.style.display = 'none';
        table.style.display = 'table';
        tbody.innerHTML = '';

        let totalOrderPrice = 0;

        cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            totalOrderPrice += itemTotal;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <strong>${item.name}</strong>
                    ${item.note ? `<span class="item-note-text">- Ghi chú: ${item.note}</span>` : ''}
                </td>
                <td style="text-align: center;">${item.quantity}</td>
                <td style="text-align: right; font-weight: 600;">${itemTotal.toLocaleString('vi-VN')} đ</td>
                <td style="text-align: center;">
                    <button class="btn-delete" onclick="removeFromCart(${index})">✕</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        totalSpan.innerText = `${totalOrderPrice.toLocaleString('vi-VN')} đ`;
    }

    // Chạy lần đầu
    renderMenu(menuData);
</script>

</body>
</html>
