<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev English - Core Chunks</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .search-box {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus {
            border-color: var(--primary);
        }
        .chunk-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chunk-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .chunk-item:hover {
            border-color: var(--primary);
            background: #eff6ff;
            transform: translateX(4px);
        }
        .chunk-en {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        .chunk-vi {
            font-size: 0.95rem;
            color: #475569;
            margin-bottom: 8px;
        }
        .chunk-usage {
            font-size: 0.85rem;
            color: #64748b;
            background: #f1f5f9;
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-block;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="search" class="search-box" placeholder="Tìm kiếm cụm từ hoặc cách dùng..." oninput="filterChunks()">
    <div id="list" class="chunk-list"></div>
</div>

<div id="toast" class="toast">📋 Đã copy cụm từ!</div>

<script>
    // Một biến duy nhất chứa toàn bộ data text hướng dẫn
    const DATA = [
        {
            en: "I managed to finish...",
            vi: "Tôi đã xử lý/xoay sở xong...",
            usage: "Dùng ở thì Past Simple khi báo cáo Stand-up để nhấn mạnh tính chủ động xử lý task."
        },
        {
            en: "I'm currently working on...",
            vi: "Hiện tại tôi đang tập trung xử lý...",
            usage: "Dùng ở thì Present Continuous để nói về task đang chạy trong ngày."
        },
        {
            en: "I've run into a minor issue with...",
            vi: "Tôi vừa đụng phải một lỗi nhỏ với...",
            usage: "Dùng ở thì Present Perfect khi gặp sự cố/blocker đột xuất cần báo cáo giảm nhẹ vấn đề."
        },
        {
            en: "The API response has changed",
            vi: "Phản hồi từ API đã bị thay đổi.",
            usage: "Dùng ở thì Present Perfect để giải thích lý do bị block do yếu tố bên ngoài vừa xảy ra."
        },
        {
            en: "It's a bit too rigid / hardcoded.",
            vi: "Nó hơi bị cứng nhắc / dữ liệu đang bị viết chết.",
            usage: "Dùng ở thì Present Simple khi làm Code Review để nhận xét về cấu trúc code hiện tại."
        },
        {
            en: "What if we...?",
            vi: "Sẽ ra sao nếu chúng ta...?",
            usage: "Cấu trúc giả định dùng để đề xuất giải pháp thay thế một cách lịch sự, cởi mở."
        },
        {
            en: "Make it more flexible",
            vi: "Làm cho nó linh hoạt hơn.",
            usage: "Dùng khi đưa ra định hướng refactor code (ví dụ: dùng Protocol hoặc Dependency Injection)."
        },
        {
            en: "It will be much easier to maintain and extend later.",
            vi: "Dễ bảo trì và mở rộng hơn về sau này.",
            usage: "Dùng ở thì Future Simple để nêu bật lợi ích lâu dài của giải pháp mới."
        }
    ];

    function render(items) {
        const listEl = document.getElementById("list");
        listEl.innerHTML = items.map(item => `
            <div class="chunk-item" onclick="copyText(\`${item.en}\`)">
                <div class="chunk-en">${item.en}</div>
                <div class="chunk-vi">${item.vi}</div>
                <div class="chunk-usage">💡 ${item.usage}</div>
            </div>
        `).join('');
    }

    function filterChunks() {
        const keyword = document.getElementById("search").value.toLowerCase();
        const filtered = DATA.filter(item => 
            item.en.toLowerCase().includes(keyword) || 
            item.vi.toLowerCase().includes(keyword) ||
            item.usage.toLowerCase().includes(keyword)
        );
        render(filtered);
    }

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById("toast");
            toast.style.display = "block";
            setTimeout(() => toast.style.display = "none", 1500);
        });
    }

    // Khởi chạy lần đầu
    render(DATA);
</script>

</body>
</html>
