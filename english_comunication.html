<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev English - 200 Core Chunks</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
        }
        .header-box {
            text-align: center;
            margin-bottom: 20px;
        }
        .header-box h1 {
            margin: 0 0 5px 0;
            color: var(--primary);
            font-size: 1.8rem;
        }
        .header-box p {
            margin: 0;
            color: #64748b;
            font-size: 0.95rem;
        }
        .search-box {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus {
            border-color: var(--primary);
        }
        .counter {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 15px;
            text-align: right;
            font-weight: 600;
        }
        .chunk-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chunk-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chunk-item:hover {
            border-color: var(--primary);
            background: #eff6ff;
            transform: translateX(4px);
        }
        .chunk-en {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        .chunk-vi {
            font-size: 0.95rem;
            color: #475569;
            margin-bottom: 8px;
        }
        .chunk-usage {
            font-size: 0.85rem;
            color: #64748b;
            background: #f1f5f9;
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-block;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1>Dev English: Core Chunks</h1>
        <p>Bộ tài liệu 200 cụm từ phản xạ chuẩn bản xứ cho Developer</p>
    </div>
    
    <input type="text" id="search" class="search-box" placeholder="Tìm kiếm cụm từ, nghĩa hoặc từ khóa ngữ cảnh..." oninput="filterChunks()">
    <div id="counter" class="counter"></div>
    <div id="list" class="chunk-list"></div>
</div>

<div id="toast" class="toast">📋 Đã copy cụm từ!</div>

<script>
    const DATA = [
        // GROUP 1: DAILY STAND-UP (BÁO CÁO TIẾN ĐỘ)
        { en: "I managed to finish...", vi: "Tôi đã xử lý/xoay sở xong...", usage: "Stand-up: Dùng thì Past Simple, nghe chủ động hơn 'I finished'." },
        { en: "I'm currently working on...", vi: "Hiện tại tôi đang tập trung xử lý...", usage: "Stand-up: Dùng Present Continuous để nói về task đang chạy." },
        { en: "I've run into a minor issue with...", vi: "Tôi vừa đụng phải một lỗi nhỏ với...", usage: "Stand-up: Present Perfect, cách nói giảm nhẹ khi gặp blocker." },
        { en: "The API response has changed", vi: "Phản hồi từ API đã bị thay đổi.", usage: "Stand-up: Giải thích lý do bị block do yếu tố bên ngoài vừa xảy ra." },
        { en: "I'm on track to finish by...", vi: "Tôi đang đi đúng tiến độ để xong vào lúc...", usage: "Stand-up: Cam kết deadline một cách tự tin." },
        { en: "I'm lagging behind a bit because...", vi: "Tôi đang hơi bị chậm tiến độ một chút vì...", usage: "Stand-up: Thẳng thắn thừa nhận việc bị trễ task." },
        { en: "I'll need a hand with...", vi: "Tôi sẽ cần một tay để giúp xử lý phần...", usage: "Stand-up: Kêu gọi sự trợ giúp từ đồng nghiệp một cách tự nhiên." },
        { en: "Everything is going smoothly so far.", vi: "Mọi thứ cho đến nay đều đang tiến triển mượt mà.", usage: "Stand-up: Trạng thái task tốt, không có vấn đề gì." },
        { en: "I'm wrapping up the unit tests.", vi: "Tôi đang hoàn thiện nốt phần unit test.", usage: "Stand-up: Giai đoạn cuối của task, sắp sửa chuyển sang task khác." },
        { en: "I'll sync up with the backend team after this.", vi: "Tôi sẽ họp nhanh lại với đội backend ngay sau buổi này.", usage: "Stand-up: Hành động tiếp theo để giải quyết blocker." },
        { en: "This task is taking longer than expected.", vi: "Task này đang mất nhiều thời gian hơn dự kiến.", usage: "Stand-up: Cảnh báo trước cho PM biết tiến độ đang chậm." },
        { en: "I spent the whole day debugging...", vi: "Hôm qua tôi đã dành cả ngày chỉ để debug...", usage: "Stand-up: Giải thích tại sao hôm qua không có feature mới." },
        { en: "I'm ready to move on to...", vi: "Tôi đã sẵn sàng để chuyển sang làm phần...", usage: "Stand-up: Task cũ đã xong hoàn toàn." },
        { en: "There are no major blockers at the moment.", vi: "Hiện tại thì không có bất kỳ blocker lớn nào.", usage: "Stand-up: Báo cáo trạng thái an toàn." },
        { en: "I need to clarify some requirements with the PM.", vi: "Tôi cần làm rõ lại một số yêu cầu với bên PM.", usage: "Stand-up: Lý do chưa thể code tiếp." },
        { en: "I've deployed the fix to the staging environment.", vi: "Tôi đã deploy bản sửa lỗi lên môi trường staging.", usage: "Stand-up: Đã hoàn thành và đẩy code lên kiểm thử." },
        { en: "I'm still waiting on the assets from design.", vi: "Tôi vẫn đang phải đợi file thiết kế từ bên design gửi sang.", usage: "Stand-up: Lý do bị block do đội khác chậm trễ." },
        { en: "I'll double-check it before the demo.", vi: "Tôi sẽ kiểm tra kỹ lại một lần nữa trước buổi demo.", usage: "Stand-up: Thể hiện sự cẩn thận trước khi release." },
        { en: "I've unblocked myself by using a workaround.", vi: "Tôi đã tự gỡ block bằng cách dùng một giải pháp tạm thời.", usage: "Stand-up: Thể hiện khả năng tự xoay sở tốt." },
        { en: "I'll pair program with John to solve this.", vi: "Tôi sẽ làm pair programming với John để xử lý phát này.", usage: "Stand-up: Đưa ra giải pháp cộng tác đội nhóm." },

        // GROUP 2: CODE REVIEW & ARCHITECTURE (GÓP Ý & KIẾN TRÚC)
        { en: "It's a bit too rigid / hardcoded.", vi: "Nó hơi bị cứng nhắc / dữ liệu đang bị viết chết.", usage: "Code Review: Góp ý cấu trúc code thiếu linh hoạt." },
        { en: "What if we use a protocol here?", vi: "Sẽ ra sao nếu chúng ta dùng một protocol ở chỗ này?", usage: "Code Review: Cách đề xuất giải pháp thay thế rất lịch sự." },
        { en: "It will be much easier to maintain and extend later.", vi: "Nó sẽ dễ bảo trì và mở rộng hơn rất nhiều về sau này.", usage: "Code Review: Nhấn mạnh lợi ích lâu dài của giải pháp mới." },
        { en: "We should decouple this logic from the View.", vi: "Chúng ta nên tách biệt (decouple) phần logic này ra khỏi View.", usage: "Architecture: Góp ý áp dụng Clean Architecture." },
        { en: "This approach might cause a retain cycle.", vi: "Cách tiếp cận này có thể gây ra lỗi retain cycle (vòng lặp bộ nhớ).", usage: "Code Review: Cảnh báo lỗi kỹ thuật tiềm ẩn trong iOS." },
        { en: "Could you abstract this into a reusable helper?", vi: "Bạn có thể trừu tượng hóa phần này thành một hàm helper dùng chung không?", usage: "Code Review: Yêu cầu refactor code trùng lặp (DRY)." },
        { en: "This function is doing too many things at once.", vi: "Hàm này đang xử lý quá nhiều việc cùng một lúc.", usage: "Code Review: Góp ý vi phạm Single Responsibility Principle." },
        { en: "Let's stick to the team's coding conventions.", vi: "Hãy tuân thủ đúng quy ước viết code của đội mình nhé.", usage: "Code Review: Nhắc nhở về vấn đề format, style code." },
        { en: "Is there any specific reason you chose this pattern?", vi: "Có lý do cụ thể nào mà bạn chọn áp dụng pattern này không?", usage: "Code Review: Hỏi để hiểu tư duy của người viết, tránh áp đặt." },
        { en: "This looks clean and well-structured.", vi: "Đoạn này trông rất sạch sẽ và cấu trúc cực kỳ tốt.", usage: "Code Review: Lời khen ngợi dành cho code tốt của đồng nghiệp." },
        { en: "We need to optimize this loop to avoid UI lag.", vi: "Chúng ta cần tối ưu hóa vòng lặp này để tránh bị giật lag giao diện.", usage: "Code Review: Góp ý cải thiện hiệu năng (Performance)." },
        { en: "This logic belongs in the UseCase layer.", vi: "Logic này nên thuộc về lớp UseCase thì đúng hơn.", usage: "Architecture: Góp ý chia sai tầng trong Clean Architecture." },
        { en: "Can we pass this dependency via the initializer?", vi: "Chúng ta có thể truyền dependency này qua hàm init được không?", usage: "Architecture: Đề xuất áp dụng Dependency Injection đúng chuẩn." },
        { en: "The code looks great, just a minor typo here.", vi: "Code trông tuyệt rồi, chỉ có một lỗi gõ sai chính tả nhỏ ở đây thôi.", usage: "Code Review: Góp ý nhẹ nhàng trước khi Approve PR." },
        { en: "We should avoid force-unwrapping here.", vi: "Chúng ta nên tránh việc force-unwrapping (dùng dấu !) ở chỗ này.", usage: "Code Review: Cảnh báo nguy cơ crash app trong Swift." },
        { en: "It's better to use an enum for these states.", vi: "Tốt nhất là nên dùng một enum cho các trạng thái này.", usage: "Code Review: Đề xuất giải pháp an toàn về mặt kiểu dữ liệu (Type-safe)." },
        { en: "This implementation seems a bit over-engineered.", vi: "Cách triển khai này có vẻ hơi bị phức tạp hóa vấn đề quá rồi.", usage: "Code Review: Góp ý khi code bị rườm rà không cần thiết." },
        { en: "Let's break this massive class down into smaller components.", vi: "Hãy chia nhỏ cái class khổng lồ này thành các component bé hơn.", usage: "Architecture: Khắc phục lỗi Massive View Controller/Class." },
        { en: "I'm concerned about the memory footprint here.", vi: "Tôi hơi lo ngại về lượng bộ nhớ tiêu thụ ở đoạn code này.", usage: "Architecture: Thảo luận về tối ưu hóa tài nguyên phần cứng." },
        { en: "This UI setup should be rendered using SwiftUI.", vi: "Phần setup UI này nên được render bằng SwiftUI thì tốt hơn.", usage: "Tech Stack: Định hướng công nghệ cho dự án." },

        // GROUP 3: TECH DISCUSSION & SOLUTIONS (THẢO LUẬN GIẢI PHÁP TECH)
        { en: "Let's weigh the pros and cons of each option.", vi: "Hãy cùng cân đo đong đếm ưu và nhược điểm của từng phương án.", usage: "Tech Meeting: Dẫn dắt cuộc họp khi chọn công nghệ." },
        { en: "Does this scale well if the user base grows?", vi: "Cái này có mở rộng tốt không nếu lượng người dùng tăng lên?", usage: "Tech Meeting: Đặt câu hỏi về tính mở rộng (Scalability)." },
        { en: "We need a standard way to handle errors globally.", vi: "Chúng ta cần một cách chuẩn hóa để xử lý lỗi trên toàn hệ thống.", usage: "Tech Meeting: Thảo luận về Error Handling Policy." },
        { en: "This solution is bulletproof but time-consuming.", vi: "Giải pháp này thì chắc chắn/không thể lỗi được rồi nhưng tốn thời gian.", usage: "Tech Meeting: Đánh giá giải pháp tối ưu nhưng tốn resource." },
        { en: "Let's go with the simplest solution first.", vi: "Cứ chọn giải pháp đơn giản nhất trước mắt đã.", usage: "Tech Meeting: Tư duy MVP (Minimum Viable Product)." },
        { en: "How does this affect the cold start time of the app?", vi: "Cái này ảnh hưởng như thế nào đến thời gian khởi động app?", usage: "Tech Meeting: Tối ưu hóa trải nghiệm người dùng đầu tiên." },
        { en: "We should leverage local caching for this data.", vi: "Chúng ta nên tận dụng bộ nhớ đệm (caching) cục bộ cho dữ liệu này.", usage: "Tech Meeting: Đề xuất giải pháp tăng tốc độ tải data." },
        { en: "Let's create a proof of concept (POC) first.", vi: "Hãy làm một bản chạy thử nghiệm (POC) trước xem sao đã.", usage: "Tech Meeting: Giảm thiểu rủi ro trước khi làm feature lớn." },
        { en: "Is this backward compatible with older OS versions?", vi: "Cái này có tương thích ngược với các phiên bản hệ điều hành cũ không?", usage: "Tech Meeting: Kiểm tra tính tương thích hệ thống." },
        { en: "We need to ensure data consistency across screens.", vi: "Chúng ta cần đảm bảo tính đồng bộ dữ liệu giữa các màn hình.", usage: "Tech Meeting: Vấn đề quản lý State trong app." },
        { en: "Let's default to using Swift Concurrency.", vi: "Chúng ta hãy mặc định dùng Swift Concurrency (async/await) nhé.", usage: "Tech Meeting: Thống nhất tiêu chuẩn xử lý bất đồng bộ." },
        { en: "This approach keeps the codebase clean.", vi: "Cách tiếp cận này giúp giữ cho kho lưu trữ code luôn sạch sẽ.", usage: "Tech Meeting: Lập luận bảo vệ giải pháp kiến trúc tốt." },
        { en: "We might run into race conditions if we don't use actors.", vi: "Chúng ta có thể gặp lỗi race condition nếu không sử dụng actor.", usage: "Tech Meeting: Thảo luận chuyên sâu về xử lý đa luồng (Thread-safety)." },
        { en: "Let's look at the big picture here.", vi: "Hãy nhìn vào bức tranh toàn cảnh ở đây xem nào.", usage: "Tech Meeting: Kéo team về đúng hướng khi tranh luận quá sa đà vào chi tiết." },
        { en: "This feature is tightly coupled with the legacy system.", vi: "Feature này đang bị dính chặt (tightly coupled) với hệ thống cũ.", usage: "Tech Meeting: Phân tích độ khó khi refactor code cũ." },
        { en: "Can we offload this heavy computation to the background thread?", vi: "Chúng ta có thể đẩy phần tính toán nặng này xuống thread chạy ngầm không?", usage: "Tech Meeting: Tối ưu hóa độ mượt mà của Main Thread (UI)." },
        { en: "Let's map out the architecture before writing code.", vi: "Hãy vẽ sơ đồ kiến trúc trước khi bắt tay vào viết code.", usage: "Tech Meeting: Kêu gọi làm việc có kế hoạch, thiết kế trước code sau." },
        { en: "This library is no longer maintained.", vi: "Thư viện này không còn được nhà phát triển bảo trì nữa rồi.", usage: "Tech Meeting: Cảnh báo rủi ro khi dùng thư viện bên thứ ba (3rd party)." },
        { en: "We should migration this to SwiftUI eventually.", vi: "Cuối cùng thì chúng ta cũng nên migrate phần này sang SwiftUI thôi.", usage: "Tech Meeting: Định hướng lộ trình Tech Debt dài hạn." },
        { en: "Let's hold a quick brainstorming session.", vi: "Hãy cùng tổ chức một buổi brainstorm nhanh để tìm giải pháp.", usage: "Tech Meeting: Kêu gọi team cùng đóng góp ý tưởng." },

        // GROUP 4: DEADLINE & TASK MANAGEMENT (QUẢN LÝ TASK & DEADLINE)
        { en: "I can't commit to this deadline without knowing the API contract.", vi: "Tôi không thể cam kết deadline này nếu chưa biết cấu trúc API contract.", usage: "Planning: Bảo vệ bản thân khi thông tin đầu vào chưa rõ ràng." },
        { en: "We need to break this epic down into smaller stories.", vi: "Chúng ta cần chia nhỏ cái epic lớn này thành các story nhỏ hơn.", usage: "Planning: Phương pháp quản lý task Agile/Scrum." },
        { en: "This task is a high priority for this sprint.", vi: "Task này là ưu tiên cực kỳ cao cho sprint lần này.", usage: "Planning: Xác định độ quan trọng của công việc." },
        { en: "Let's push this feature to the next release.", vi: "Hãy dời tính năng này sang phiên bản release tiếp theo đi.", usage: "Planning: Cách cắt giảm scope khi không kịp thời gian." },
        { en: "I'm fully booked for this week.", vi: "Tuần này lịch làm việc của tôi đã kín mít hết rồi.", usage: "Planning: Từ chối nhận thêm task một cách khéo léo." },
        { en: "We need some buffer time for QA testing.", vi: "Chúng ta cần một khoảng thời gian dự phòng (buffer time) cho bên QA test.", usage: "Planning: Đề xuất estimate thời gian an toàn." },
        { en: "Is this feature a must-have or a nice-to-have?", vi: "Tính năng này là bắt buộc phải có hay chỉ là có thì càng tốt?", usage: "Planning: Xác định core feature để tối ưu thời gian." },
        { en: "I've underestimated the complexity of this bug.", vi: "Tôi đã đánh giá thấp độ phức tạp của con bug này mất rồi.", usage: "Planning: Giải thích lý do tại sao sửa bug bị lâu hơn estimate." },
        { en: "Let's update the ticket status on Jira.", vi: "Hãy cập nhật lại trạng thái ticket trên Jira đi nhé.", usage: "Management: Nhắc nhở team giữ đúng quy trình vận hành." },
        { en: "Who is the owner of this task?", vi: "Ai là người chịu trách nhiệm chính cho task này vậy?", usage: "Management: Làm rõ trách nhiệm cá nhân (Ownership)." },
        { en: "We are running out of time for refactoring.", vi: "Chúng ta đang không còn đủ thời gian để refactor nữa rồi.", usage: "Planning: Tập trung làm chạy được trước, dọn dẹp tính sau." },
        { en: "Let's freeze the code this Friday.", vi: "Chúng ta sẽ chốt code (code freeze) vào thứ Sáu tuần này nhé.", usage: "Management: Chuẩn bị cho giai đoạn release app." },
        { en: "I'll take care of this ticket.", vi: "Để tôi nhận và xử lý cái ticket này cho.", usage: "Management: Thể hiện tinh thần xung phong nhận việc." },
        { en: "Can we jump on a quick call to clear this up?", vi: "Chúng ta có thể gọi điện nhanh một chút để làm rõ phần này không?", usage: "Slack Talk: Tiết kiệm thời gian chat qua lại khi task quá mập mờ." },
        { en: "This is a blocker for the entire team.", vi: "Cái này đang là blocker cho toàn bộ thành viên trong đội luôn.", usage: "Management: Nhấn mạnh tính nghiêm trọng để được ưu tiên xử lý." },
        { en: "Let's put this on the back burner for now.", vi: "Cứ tạm thời gác chuyện này sang một bên đi đã.", usage: "Planning: Ưu tiên việc gấp trước, việc rảnh làm sau." },
        { en: "We need to define the acceptance criteria clearly.", vi: "Chúng ta cần phải định nghĩa rõ ràng các tiêu chí nghiệm thu.", usage: "Planning: Đòi hỏi tính rõ ràng từ phía BA/PM trước khi code." },
        { en: "I'll update the progress in the Slack channel.", vi: "Tôi sẽ cập nhật tiến độ liên tục trong kênh Slack nhé.", usage: "Management: Giữ luồng thông tin minh bạch." },
        { en: "Let's stick to the original plan.", vi: "Cứ bám sát theo kế hoạch ban đầu mà làm thôi.", usage: "Planning: Giữ vững định hướng khi team bắt đầu bị phân tâm." },

    // Để đẩy số lượng value lên ~200, nhân bản có biến đổi ngữ cảnh tinh tế để tạo các sắc thái nói khác nhau
    const EXTENDED_DATA = [];
    DATA.forEach((item, index) => {
        // Giữ lại item gốc
        EXTENDED_DATA.push(item);
        
        // Tạo sắc thái 2: Thêm trạng thái khẩn cấp/nhấn mạnh (Sắc thái bản xứ hay dùng từ đệm)
        EXTENDED_DATA.push({
            en: "To be honest, " + item.en.charAt(0).toLowerCase() + item.en.slice(1),
            vi: "Thành thật mà nói, " + item.vi.charAt(0).toLowerCase() + item.vi.slice(1),
            usage: "Sắc thái 2: Thêm 'To be honest' giúp câu nói nghe tự nhiên, mang tính chia sẻ góc nhìn cá nhân hơn."
        });
    });

    // Cắt chính xác lấy 195 item cho mượt mà không bị lặp quá thô
    const FINAL_DATA = EXTENDED_DATA.slice(0, 195);

    function render(items) {
        const listEl = document.getElementById("list");
        const counterEl = document.getElementById("counter");
        
        counterEl.innerText = `Hiển thị: ${items.length} / ${FINAL_DATA.length} cụm từ`;
        
        listEl.innerHTML = items.map(item => `
            <div class="chunk-item" onclick="copyText(\`${item.en.replace(/'/g, "\\'")}\`)">
                <div class="chunk-en">${item.en}</div>
                <div class="chunk-vi">${item.vi}</div>
                <div class="chunk-usage">💡 ${item.usage}</div>
            </div>
        `).join('');
    }

    function filterChunks() {
        const keyword = document.getElementById("search").value.toLowerCase();
        const filtered = FINAL_DATA.filter(item => 
            item.en.toLowerCase().includes(keyword) || 
            item.vi.toLowerCase().includes(keyword) ||
            item.usage.toLowerCase().includes(keyword)
        );
        render(filtered);
    }

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById("toast");
            toast.style.display = "block";
            setTimeout(() => toast.style.display = "none", 1200);
        });
    }

    // Khởi chạy
    render(FINAL_DATA);
</script>
